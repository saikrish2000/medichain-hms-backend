<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — HMS</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 1rem; top: 50%;
            transform: translateY(-50%);
            cursor: pointer; color: var(--clay-text-muted);
            background: none; border: none;
        }
        .remember-row {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 1.25rem;
        }
        .clay-checkbox { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .clay-checkbox input { width: 18px; height: 18px; accent-color: var(--clay-primary); cursor: pointer; }
        .clay-checkbox span { font-size: 0.85rem; font-weight: 600; color: var(--clay-text-muted); }
        .forgot-link { font-size: 0.85rem; font-weight: 700; color: var(--clay-primary); text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; }
        .register-prompt { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--clay-text-muted); }
        .register-prompt a { color: var(--clay-primary); font-weight: 700; text-decoration: none; }
        .register-prompt a:hover { text-decoration: underline; }
        .hospital-name {
            font-size: 0.75rem; font-weight: 700;
            color: var(--clay-text-muted); letter-spacing: 1px;
            text-transform: uppercase; margin-top: 0.25rem;
        }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">🏥</div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-subtitle">Sign in to your HMS account</div>
            <div class="hospital-name">Hospital Management System</div>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="clay-alert clay-alert-danger">
            <i class="fa fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="clay-alert clay-alert-success">
            <i class="fa fa-circle-check"></i>
            <span th:text="${message}"></span>
        </div>
        <div th:if="${success}" class="clay-alert clay-alert-success">
            <i class="fa fa-circle-check"></i>
            <span th:text="${success}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/login}" th:object="${loginRequest}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="clay-label" for="usernameOrEmail">
                    <i class="fa fa-user"></i> Username or Email
                </label>
                <input type="text"
                       id="usernameOrEmail"
                       th:field="*{usernameOrEmail}"
                       class="clay-input"
                       placeholder="Enter username or email"
                       autocomplete="username"
                       required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('usernameOrEmail')}"
                     th:errors="*{usernameOrEmail}"></div>
            </div>

            <div class="form-group">
                <label class="clay-label" for="password">
                    <i class="fa fa-lock"></i> Password
                </label>
                <div class="password-wrapper">
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="clay-input"
                           placeholder="Enter your password"
                           autocomplete="current-password"
                           required/>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fa fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>

            <div class="remember-row">
                <label class="clay-checkbox">
                    <input type="checkbox" th:field="*{rememberMe}"/>
                    <span>Remember me</span>
                </label>
                <a href="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="clay-btn clay-btn-primary clay-btn-block clay-btn-lg">
                <i class="fa fa-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div class="register-prompt">
            Don't have an account?
            <a href="/register">Create one here</a>
        </div>

    </div>
</div>

<script>
    function togglePassword() {
        const pwd = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.className = 'fa fa-eye-slash';
        } else {
            pwd.type = 'password';
            icon.className = 'fa fa-eye';
        }
    }
</script>
</body>
</html>
