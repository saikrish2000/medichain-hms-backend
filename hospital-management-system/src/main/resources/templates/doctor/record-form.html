<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add Medical Record</title></head>

<th:block layout:fragment="sidebar-nav">
    <div class="nav-section-title">Main</div>
    <a th:href="@{/doctor/dashboard}"    class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
    <div class="nav-section-title">Clinical</div>
    <a th:href="@{/doctor/patients}"     class="nav-link active"><span class="nav-icon">🧑‍⚕️</span> My Patients</a>
</th:block>
<th:block layout:fragment="topbar-title">Add Medical Record</th:block>

<th:block layout:fragment="content">
<style>
    .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .section-title { font-size:0.9rem; font-weight:800; color:var(--clay-text); margin:1.5rem 0 0.75rem; padding-bottom:0.5rem; border-bottom:2px solid var(--clay-border); }
</style>

<!-- Patient banner -->
<div style="background:var(--pastel-purple); border:2.5px solid var(--clay-border); border-radius:var(--radius-lg); padding:1.25rem 1.5rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; box-shadow:var(--shadow-card);">
    <div style="width:48px;height:48px;border-radius:50%;background:var(--clay-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:1.2rem;"
         th:text="${#strings.substring(patient.user.firstName,0,1)}">P</div>
    <div>
        <div style="font-weight:800; font-size:1rem;" th:text="${patient.user.fullName}">Patient</div>
        <div style="font-size:0.8rem; color:var(--clay-text-muted);"
             th:text="'DOB: ' + ${patient.user.dateOfBirth != null ? #temporals.format(patient.user.dateOfBirth,'dd MMM yyyy') : 'N/A'} + ' · ' + (patient.user.bloodGroup != null ? patient.user.bloodGroup : 'Blood group unknown')">—</div>
    </div>
</div>

<div style="background:#fff; border:2.5px solid var(--clay-border); border-radius:var(--radius-lg); padding:2rem; box-shadow:var(--shadow-card);">
    <h2 style="font-size:1.2rem; font-weight:800; margin-bottom:0.5rem;">📝 New Medical Record</h2>
    <p style="color:var(--clay-text-muted); font-size:0.875rem; margin-bottom:1.5rem;">Record today's consultation details, vitals, and prescription.</p>

    <form th:action="@{/doctor/records/save}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="patientId"     th:value="${patient.id}"/>
        <input type="hidden" name="appointmentId" th:value="${appointmentId}"/>

        <!-- Visit date -->
        <div class="form-group">
            <label class="clay-label">Visit Date</label>
            <input type="date" name="visitDate" class="clay-input"
                   th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required/>
        </div>

        <div class="section-title">🩺 Clinical Details</div>
        <div class="form-group">
            <label class="clay-label">Diagnosis *</label>
            <textarea name="diagnosis" class="clay-input" rows="2" required
                      placeholder="Primary diagnosis..." style="resize:vertical;"></textarea>
        </div>
        <div class="form-grid-2">
            <div class="form-group">
                <label class="clay-label">Symptoms</label>
                <textarea name="symptoms" class="clay-input" rows="2"
                          placeholder="Reported symptoms..." style="resize:vertical;"></textarea>
            </div>
            <div class="form-group">
                <label class="clay-label">Treatment Plan</label>
                <textarea name="treatment" class="clay-input" rows="2"
                          placeholder="Treatment given / recommended..." style="resize:vertical;"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="clay-label">💊 Prescription</label>
            <textarea name="prescription" class="clay-input" rows="3"
                      placeholder="Medicines, dosage, and duration..."
                      style="resize:vertical; font-family:monospace;"></textarea>
        </div>

        <div class="section-title">📏 Vitals</div>
        <div class="form-grid-3">
            <div class="form-group">
                <label class="clay-label">Blood Pressure</label>
                <input type="text" name="bloodPressure" class="clay-input" placeholder="120/80"/>
            </div>
            <div class="form-group">
                <label class="clay-label">Heart Rate (bpm)</label>
                <input type="number" name="heartRate" class="clay-input" placeholder="72"/>
            </div>
            <div class="form-group">
                <label class="clay-label">Temperature (°C)</label>
                <input type="number" step="0.1" name="temperature" class="clay-input" placeholder="98.6"/>
            </div>
            <div class="form-group">
                <label class="clay-label">Weight (kg)</label>
                <input type="number" step="0.1" name="weight" class="clay-input" placeholder="65.0"/>
            </div>
            <div class="form-group">
                <label class="clay-label">Height (cm)</label>
                <input type="number" step="0.1" name="height" class="clay-input" placeholder="170.0"/>
            </div>
            <div class="form-group">
                <label class="clay-label">SpO₂ (%)</label>
                <input type="number" step="0.1" name="oxygenSaturation" class="clay-input" placeholder="98.5"/>
            </div>
        </div>

        <div class="section-title">📅 Follow-up</div>
        <div class="form-grid-2">
            <div class="form-group">
                <label class="clay-label">Follow-up Date</label>
                <input type="date" name="followUpDate" class="clay-input"/>
            </div>
            <div class="form-group">
                <label class="clay-label">Follow-up Notes</label>
                <textarea name="followUpNotes" class="clay-input" rows="2"
                          placeholder="Instructions for next visit..." style="resize:vertical;"></textarea>
            </div>
        </div>

        <div class="form-group" style="display:flex; align-items:center; gap:0.5rem; margin-top:0.5rem;">
            <input type="checkbox" name="isConfidential" value="true" id="confCheck"
                   style="width:18px;height:18px;accent-color:var(--clay-primary);cursor:pointer;"/>
            <label for="confCheck" style="font-weight:600; font-size:0.875rem; cursor:pointer;">
                🔒 Mark as Confidential (only visible to treating doctors)
            </label>
        </div>

        <div style="display:flex; gap:0.75rem; margin-top:2rem;">
            <button type="submit" class="clay-btn clay-btn-primary" style="padding:0.7rem 2rem;">
                💾 Save Record
            </button>
            <a th:href="@{/doctor/patients}" class="clay-btn clay-btn-secondary">Cancel</a>
        </div>
    </form>
</div>
</th:block>
</html>
