<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password — HMS</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🔒</div>
            <div class="auth-title">Reset Password</div>
            <div class="auth-subtitle">Choose a strong new password</div>
        </div>

        <div th:if="${error}" class="clay-alert clay-alert-danger">
            <i class="fa fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/reset-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="form-group">
                <label class="clay-label">New Password</label>
                <input type="password" name="newPassword" class="clay-input"
                       placeholder="Min 8 chars, upper + lower + number" required/>
            </div>
            <div class="form-group">
                <label class="clay-label">Confirm New Password</label>
                <input type="password" name="confirmPassword" class="clay-input"
                       placeholder="Re-enter your new password" required/>
            </div>
            <button type="submit" class="clay-btn clay-btn-primary clay-btn-block clay-btn-lg">
                <i class="fa fa-lock"></i> Reset Password
            </button>
        </form>
    </div>
</div>
</body>
</html>
