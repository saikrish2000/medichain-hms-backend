<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password — HMS</title>
    <link rel="stylesheet" th:href="@{/css/claymorphism.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">🔑</div>
            <div class="auth-title">Forgot Password?</div>
            <div class="auth-subtitle">Enter your email — we'll send a reset link</div>
        </div>

        <div th:if="${success}" class="clay-alert clay-alert-success">
            <i class="fa fa-circle-check"></i>
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="clay-alert clay-alert-danger">
            <i class="fa fa-circle-exclamation"></i>
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label class="clay-label">Email Address</label>
                <input type="email" name="email" class="clay-input"
                       placeholder="your@email.com" required/>
            </div>
            <button type="submit" class="clay-btn clay-btn-primary clay-btn-block clay-btn-lg">
                <i class="fa fa-paper-plane"></i> Send Reset Link
            </button>
        </form>

        <div style="text-align:center; margin-top:1.5rem;">
            <a href="/login" style="color:var(--clay-primary); font-weight:700; text-decoration:none;">
                <i class="fa fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>
</body>
</html>
