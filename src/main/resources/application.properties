# ============================================================
# MediChain HMS — application.properties
# Works out of the box. All 3rd-party services are optional.
# ============================================================

server.port=8080
spring.application.name=medichain-hms

# ── Database ─────────────────────────────────────────────────
# Override with env vars: DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hospital_db}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ──────────────────────────────────────────────────────
# update = self-healing: adds missing columns automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── Flyway ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=false
spring.flyway.repair-on-migrate=false

# ── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:MediChainHMS2025SuperSecretKey256BitsLongPleaseChangeInProd}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# ── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:4000}

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Email (Gmail SMTP) — OPTIONAL ────────────────────────────
# If not configured, emails are logged instead of sent
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ── Razorpay — OPTIONAL ──────────────────────────────────────
# Get keys from: https://dashboard.razorpay.com
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

# ── Twilio SMS — OPTIONAL ────────────────────────────────────
# If not configured, SMS messages are logged instead of sent
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────
logging.level.com.hospital=INFO
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO

# ── App ──────────────────────────────────────────────────────
app.mail.from=${MAIL_USERNAME:noreply@medichain.com}
app.base-url=${BASE_URL:http://localhost:8080}

# ── Swagger ──────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.hospital.controller
